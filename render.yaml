services:
  - type: web
    runtime: static
    name: localyze
    staticPublishPath: .
    buildCommand: ""
    pullRequestPreviewsEnabled: false
    # Note: do NOT add `routes: [{ type: rewrite, source: /*, destination: /404.html }]`.
    # Render auto-serves /404.html with proper HTTP 404 for missing paths; a
    # rewrite would serve it with HTTP 200 and cause Google to index every
    # garbage URL as a valid page.
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: "interest-cohort=(), browsing-topics=()"
      - path: /*
        name: Strict-Transport-Security
        value: "max-age=31536000; includeSubDomains"
      - path: /assets/*
        name: Cache-Control
        value: "public, max-age=31536000, immutable"
      - path: /*.html
        name: Cache-Control
        value: "public, max-age=300, must-revalidate"
      - path: /sitemap.xml
        name: Cache-Control
        value: "public, max-age=3600"
      - path: /robots.txt
        name: Cache-Control
        value: "public, max-age=86400"
